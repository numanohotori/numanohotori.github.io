<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>沼のほとり - 観測中サイン</title>
  <link rel="icon" type="image/png" href="{{ site.baseurl }}/assets/images/favicon.png">
  <style>
    /* A4サイズ（210mm × 297mm）に最適化 */
    @page {
      size: A4 portrait;
      margin: 0;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 210mm;
      height: 297mm;
      margin: 0 auto;
      background: #0d1117;
      color: #e6edf3;
      font-family: "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 10mm 15mm;
      position: relative;
      overflow: hidden;
    }

    /* ===== 背景の星 ===== */
    body::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background:
        radial-gradient(1.5px 1.5px at 20% 15%, rgba(255,255,255,0.8), transparent),
        radial-gradient(1px 1px at 50% 8%, rgba(255,255,255,0.6), transparent),
        radial-gradient(1.5px 1.5px at 80% 22%, rgba(255,255,255,0.7), transparent),
        radial-gradient(1px 1px at 10% 35%, rgba(255,255,255,0.5), transparent),
        radial-gradient(2px 2px at 65% 5%, rgba(255,255,255,0.9), transparent),
        radial-gradient(1px 1px at 35% 28%, rgba(255,255,255,0.4), transparent),
        radial-gradient(1.5px 1.5px at 90% 40%, rgba(255,255,255,0.6), transparent),
        radial-gradient(1px 1px at 5% 50%, rgba(255,255,255,0.5), transparent),
        radial-gradient(1px 1px at 45% 42%, rgba(255,255,255,0.3), transparent),
        radial-gradient(1.5px 1.5px at 75% 55%, rgba(255,255,255,0.5), transparent),
        radial-gradient(1px 1px at 25% 60%, rgba(255,255,255,0.4), transparent),
        radial-gradient(1px 1px at 55% 70%, rgba(255,255,255,0.3), transparent),
        radial-gradient(1.5px 1.5px at 85% 75%, rgba(255,255,255,0.5), transparent),
        radial-gradient(1px 1px at 15% 80%, rgba(255,255,255,0.4), transparent),
        radial-gradient(2px 2px at 40% 88%, rgba(255,255,255,0.6), transparent),
        radial-gradient(1px 1px at 70% 92%, rgba(255,255,255,0.3), transparent),
        radial-gradient(1.5px 1.5px at 95% 12%, rgba(255,255,255,0.7), transparent),
        radial-gradient(1px 1px at 60% 48%, rgba(255,255,255,0.3), transparent);
      pointer-events: none;
      z-index: 0;
    }

    /* 全コンテンツを前面に */
    body > * {
      position: relative;
      z-index: 1;
    }

    /* ===== ロゴ ===== */
    .logo {
      width: 95mm;
      height: auto;
      margin-bottom: 12mm;
    }

    /* ===== 観測中バッジ ===== */
    .badge {
      background: #c9a000;
      color: #0d1117;
      font-size: 40pt;
      font-weight: 900;
      letter-spacing: 0.4em;
      padding: 5mm 14mm 5mm 20mm;
      border-radius: 4mm;
      margin-bottom: 12mm;
      text-align: center;
    }

    /* ===== メインメッセージ ===== */
    .main-message {
      font-size: 64pt;
      font-weight: 900;
      text-align: center;
      line-height: 1.3;
      margin-bottom: 12mm;
      color: #ffffff;
      text-shadow: 0 0 20px rgba(126, 184, 218, 0.4);
    }

    /* ===== サブメッセージ ===== */
    .sub-message {
      font-size: 28pt;
      font-weight: bold;
      text-align: center;
      line-height: 1.8;
      color: #ffffff;
    }

/* ===== 印刷時の設定 ===== */
    @media print {
      body {
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
    }
  </style>
</head>
<body>

  <!-- ロゴ -->
  <img src="{{ site.baseurl }}/assets/images/logo.png" alt="沼のほとり" class="logo">

  <!-- 観測中バッジ -->
  <div class="badge">観 測 中</div>

  <!-- メインメッセージ -->
  <div class="main-message">
    星を見ています
  </div>

  <!-- サブメッセージ -->
  <div class="sub-message">
    天体観測を行っています<br>
    お気軽にお声がけください
  </div>



</body>
</html>
